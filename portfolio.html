<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XenoPrime — Our Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/design-tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/nav.css">
<link rel="stylesheet" href="assets/css/components.css">
<style>
.work-hero{padding:calc(var(--nav-height) + 4rem) 0 2rem;text-align:center}
.stepper{display:flex;justify-content:center;gap:0;margin:2.5rem 0 1rem;flex-wrap:wrap}
.step-pill{font-family:var(--font-mono);font-size:var(--fs-xs);padding:8px 18px;border:1px solid var(--border-subtle);color:var(--text-tertiary);transition:all var(--duration-fast)}
.step-pill:first-child{border-radius:var(--radius-full) 0 0 var(--radius-full)}
.step-pill:last-child{border-radius:0 var(--radius-full) var(--radius-full) 0}
.step-pill.done{background:var(--accent-cyan-dim);color:var(--accent-cyan);border-color:rgba(6,214,160,0.3)}
.step-pill.active{background:var(--gradient-primary);color:white;border-color:var(--accent-blue)}
/* Browser mockup */
.browser{margin:3rem auto 0;max-width:920px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-xl);transition:all var(--duration-normal)}
.browser:hover{border-color:var(--border-hover)}
.browser-bar{background:var(--surface-2);padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-subtle)}
.dot{width:10px;height:10px;border-radius:50%}
.dot.r{background:var(--accent-rose)}.dot.y{background:var(--accent-amber)}.dot.g{background:var(--accent-cyan)}
.browser-url{margin-left:14px;background:var(--bg-primary);border-radius:var(--radius-full);padding:6px 16px;font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-tertiary);flex:1;max-width:340px}
.live-tag{margin-left:auto;font-family:var(--font-mono);font-size:0.65rem;color:var(--accent-rose);display:flex;align-items:center;gap:6px;letter-spacing:var(--ls-wide)}
.live-tag .rd{width:7px;height:7px;border-radius:50%;background:var(--accent-rose);animation:pulse-dot 1.2s ease-in-out infinite}
.browser-canvas{padding:2rem}
/* Skeleton shimmer */
.sk{background:linear-gradient(100deg,var(--surface-2) 30%,rgba(255,255,255,0.04) 50%,var(--surface-2) 70%);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-nav{height:36px;width:100%;margin-bottom:1.5rem}
.sk-hero-title{height:26px;width:70%;margin-bottom:12px}
.sk-hero-title.short{width:45%;margin-bottom:1.5rem}
.sk-hero-sub{height:12px;width:85%;margin-bottom:8px}
.sk-hero-sub.s2{width:60%;margin-bottom:1.5rem}
.sk-btn{height:38px;width:150px;border-radius:var(--radius-full)}
.sk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2rem}
.sk-card{padding:1.25rem;border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.sk-card .sk-icon{height:30px;width:30px;border-radius:var(--radius-sm);margin-bottom:14px}
.sk-card .sk-line{height:10px;width:80%;margin-bottom:8px}
.sk-card .sk-line.w60{width:60%}
@media(max-width:720px){.sk-grid{grid-template-columns:1fr}.browser-canvas{padding:1rem}}
/* Build log */
.build-log{max-width:640px;margin:3rem auto 0;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-xl) var(--space-2xl)}
.build-log h3{font-family:var(--font-display);font-size:var(--fs-h4);margin-bottom:var(--space-lg)}
.log-line{display:flex;gap:10px;font-family:var(--font-mono);font-size:var(--fs-small);color:var(--text-secondary);padding:6px 0;border-bottom:1px dashed var(--border-subtle)}
.log-line:last-child{border-bottom:none}
.log-line .tick{color:var(--accent-cyan)}.log-line.pending .tick{color:var(--accent-amber)}
.cta-block{text-align:center;margin:4rem 0 5rem}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader__brand">Xeno<span class="text-gradient">Prime</span></div><div class="loader__bar"><div class="loader__bar-fill"></div></div></div>
<div class="noise-overlay"></div>
<div class="cursor-glow"></div><div class="cursor-dot"></div>

<div class="global-bg" id="globalBg"></div>

<nav class="nav"><div class="nav__inner">
  <a href="index.html" class="nav__brand">Xeno<span class="nav__brand-accent">Prime</span></a>
  <div class="nav__links">
    <div class="currency-dropdown-wrap">
      <button class="currency-btn-active">🇺🇸 USD <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
      <div class="currency-menu">
        <div class="currency-option" data-currency="USD">🇺🇸 USD</div>
        <div class="currency-option" data-currency="EUR">🇪🇺 EUR</div>
        <div class="currency-option" data-currency="GBP">🇬🇧 GBP</div>
        <div class="currency-option" data-currency="INR">🇮🇳 INR</div>
      </div>
    </div>
    <a href="index.html" class="nav__link">← Back to Home</a>
  </div>
</div></nav>

<section class="work-hero" style="position: relative; overflow: hidden; min-height: 80vh; display: flex; align-items: center;">
  <!-- Live Plasma WebGL Background -->
  <canvas class="plasma-bg-canvas" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></canvas>
  <canvas id="orb-particles" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;"></canvas>
  
  <div class="container" style="position: relative; z-index: 10; width: 100%;">
    <div class="eyebrow" data-gsap="fade-up">Our Portfolio</div>
    <h1 class="heading-1" data-gsap="fade-up" style="margin-top:1rem">Showcase <span class="text-gradient">Coming Soon</span></h1>
    <p class="text-lg text-dim" data-gsap="fade-up" style="max-width:540px;margin:1rem auto 0">We are currently curating a stunning collection of our best work. In the meantime, you can see how we build live, or start your own project today.</p>
    
    <div class="cta-block" data-gsap="fade-up" style="margin-top: 3rem; display: flex; justify-content: center; gap: 1rem;">
      <a class="btn btn--primary" href="see-what-i-build.html" data-magnetic>View Live Build Simulation</a>
      <a class="btn" href="pricing.html" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" data-magnetic>View Pricing</a>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.3.25/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="assets/js/plasma-bg.js"></script>
<script src="assets/js/orb-particles.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
